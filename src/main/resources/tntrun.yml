# World settings
disableDamage: true
disableWeather: true
disableHunger: true
disableNaturalCreatureSpawn: true
enableNightVision: true

# Lobby settings (lobby items given to players)
joiningCompassName: "&2Join Arena"
showPlayersName: "&2Show Players"
hidePlayersName: "&2Hide Players"

# Arena settings

# countdown (time in seconds)
fullCountdown: 60
halfCountdown: 30
quarterCountdown: 15

forceStartCountdown: 5

requiredPlayersToStartCountdown: 2  # cannot be set less than 2 (will be set to 2 in memory when run)
requiredPlayersToStartHalfCountdown: 4
requiredPlayersToStartQuarterCountdown: 8
maxPlayers: 8

# starting
forcePlayerGameMode: true
clearInventory: true
setFullHealth: true
setFullHunger: true

# playing
gracePeriod: 2  # after Go! how long before blocks start disappearing
tntRemoveDelay: 10  # ticks
playerDeathYLevel: 0
voidYLevel: -20  # needs to be less than playerDeathYLevel (will tp players back to world spawn if they fall below this y level)

# spectating (spectating items given to players)
spectatingCompassName: "&2Spectate Players"
playAgainName: "&2Play Again"
showSpectatorsName: "&2Show Spectators"
hideSpectatorsName: "&2Hide Spectators"
leaveName: "&2Return to Lobby"